# Personal Preset
# Restrictive for personal assistant use
# Use for: Email, scheduling, personal tasks

version: "1.0"
preset: personal

# Block by default when approval needed
approve_fallback: block

# Budget limits
budget:
  max_session_cost: 10
  alert_at: 8

# Capability levels
capabilities:
  filesystem: scoped_write
  terminal: disabled
  git: disabled
  network: full_access
  database: read_only

# Knob overrides
overrides:
  terminal:
    command_exec: block
    destructive_commands: block
    package_installs: block
